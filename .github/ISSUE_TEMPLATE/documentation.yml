name: Documentation improvement
description: Improve README, tutorials, blog text, methods language, or deployment docs.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Page or section
      placeholder: "README reverse-complement section, blog FASTQ tutorial, etc."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What should be clearer?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or example
    validations:
      required: false
