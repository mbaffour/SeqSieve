name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Validation tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation tests
        run: npm test
